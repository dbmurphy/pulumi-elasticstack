name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: provider/go.mod
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
      - name: Verify golangci-lint config
        run: cd provider && golangci-lint config verify
      - name: Run go vet
        run: cd provider && go vet ./...
      - name: Run golangci-lint
        run: cd provider && golangci-lint run
      - uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1
        with:
          work-dir: provider

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: provider/go.mod
      - name: Run tests
        run: cd provider && go test ./... -v -count=1 -race -coverprofile=coverage.out
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage
          path: provider/coverage.out

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: provider/go.mod
      - name: Check go.mod tidy
        run: |
          cd provider && go mod tidy
          if [ -n "$(git diff -- go.mod go.sum)" ]; then
            echo "::error::go.mod or go.sum is not tidy. Run 'go mod tidy' and commit."
            git diff -- go.mod go.sum
            exit 1
          fi
      - name: Build provider
        run: make build
      - name: Generate schema
        run: make schema
      - name: Verify clean working tree
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Working tree is dirty after build. Commit generated files."
            git diff
            exit 1
          fi
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: provider-binary
          path: |
            bin/pulumi-resource-elasticstack
            schema.json

  build-sdks:
    name: Build SDKs
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        language: [nodejs, python, go, dotnet]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: provider/go.mod
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: provider-binary
      - name: Make provider binary executable
        run: chmod +x bin/pulumi-resource-elasticstack
      - name: Generate SDK
        run: pulumi package gen-sdk ./bin/pulumi-resource-elasticstack --language ${{ matrix.language }} -o sdk/${{ matrix.language }}
      - name: Build SDK (nodejs)
        if: matrix.language == 'nodejs'
        run: cd sdk/nodejs/nodejs && npm install && npm run build
      - name: Build SDK (python)
        if: matrix.language == 'python'
        run: cd sdk/python/python && pip install -e .
      - name: Build SDK (go)
        if: matrix.language == 'go'
        run: |
          cd sdk/go/go
          go mod init github.com/dbmurphy/pulumi-elasticstack/sdk/go
          go mod tidy
          go build ./...
      - name: Build SDK (dotnet)
        if: matrix.language == 'dotnet'
        run: cd sdk/dotnet/dotnet && dotnet build
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sdk-${{ matrix.language }}
          path: sdk/${{ matrix.language }}
