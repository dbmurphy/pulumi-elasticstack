name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  build-provider:
    name: Build Provider
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: provider/go.mod
      - uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-sdks:
    name: Build & Attach SDKs
    runs-on: ubuntu-latest
    needs: build-provider
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: provider/go.mod
      - name: Download provider binary from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release download "${TAG_NAME}" \
            --pattern "pulumi-resource-elasticstack-${TAG_NAME}-linux-amd64.tar.gz" \
            --dir /tmp/provider
          tar -xzf "/tmp/provider/pulumi-resource-elasticstack-${TAG_NAME}-linux-amd64.tar.gz" -C /tmp/provider
          chmod +x /tmp/provider/pulumi-resource-elasticstack
      - name: Generate SDKs
        run: |
          for lang in nodejs python go dotnet; do
            pulumi package gen-sdk /tmp/provider/pulumi-resource-elasticstack --language "${lang}" -o "sdk/${lang}"
          done
      - name: Package SDKs
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          for lang in nodejs python go dotnet; do
            tar -czf "sdk-${lang}-${TAG_NAME}.tar.gz" -C sdk "${lang}"
          done
      - name: Attach SDKs to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release upload "${TAG_NAME}" sdk-*-"${TAG_NAME}".tar.gz
